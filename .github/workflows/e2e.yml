name: E2E

# Runs on PRs targeting main (so results show up during review) and on
# push to main itself. Not added as a required status check -- `main` has
# no branch protection rules, so a red check here can never block a
# merge; this workflow existing at all is what makes it "visible", not
# "blocking". See specs/end-to-end-testing.md for the full reasoning.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @res-gen-3/end-to-end exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: end-to-end/playwright-report/
          retention-days: 14
